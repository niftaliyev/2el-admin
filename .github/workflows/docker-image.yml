name: Admin CI/CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/root/admin"

      - name: Build & Run Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd /root/admin

            echo "Stopping old container..."
            docker stop elanaz-admin || true
            docker rm elanaz-admin || true

            echo "Building image..."
            docker build -t elanaz-admin .

            echo "Starting container..."
            docker run -d \
              --name elanaz-admin \
              -p 3002:3002 \
              --restart unless-stopped \
              elanaz-admin

            echo "Admin deployed successfully"
